  <link rel="shortcut icon" href="assets/favicon/car.png" />

</head>

<body>
  <header class="hero about-contact-hero">
    <nav class="nav-bar-home">
      <a href="#" class="logo">
        <img src="assets/images/logo.png" alt="logo" />
      </a>
      <div class="nav-bar-links">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about-contact.html">About Us</a></li>
          <li><a href="services.html">Car Service</a></li>
          <li><a href="about-contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>
    <div class="hero-content">
      <h1>About <span>&</span> Contact Us</h1>
      <p>Learn more about Auto-Nest and get in touch with our team. We're here to make your car rental experience seamless.</p>
      <a href="#contactForm" class="hero-btn">Send Us a Message</a>
    </div>
  </header>

  <main class="about-contact-container">
    <section class="about-us-section">
      <!-- About Cards Here -->
    </section>

    <section class="contact-section" id="contact">
      <div class="car-section">
        <h2>Get In Touch</h2>
        <div class="contact-container">
          <div class="contact-form-container">
            <h3>Send Us a Message</h3>
            <form action="contact-submission.php" method="POST" class="contact-form">
              <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required />
              </div>
              <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required />
              </div>
              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" />
              </div>
              <div class="form-group">
                <label for="subject">Subject *</label>
                <select id="subject" name="subject" required>
                  <option value="">Select a subject</option>
                  <option value="general">General Inquiry</option>
                  <option value="booking">Booking Assistance</option>
                  <option value="support">Technical Support</option>
                  <option value="feedback">Feedback/Suggestions</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
              </div>
              <div class="form-group checkbox-group">
                <input type="checkbox" id="newsletter" name="newsletter" />
                <label for="newsletter">Subscribe to our newsletter</label>
              </div>
              <button type="submit" class="hero-btn"><i class="fas fa-paper-plane"></i> Send Message</button>
              <div id="formSuccess" class="success-message"></div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <!-- Footer content here -->
  </footer>

 </body>

</html>
